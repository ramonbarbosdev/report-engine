# =============================================================================
# Report Engine - configuracao principal
# =============================================================================

spring.application.name=report-engine

# Banco de metadados (definicoes de relatorios, filtros, templates, logs)
spring.datasource.url=${REPORT_DB_METADATA_URL}
spring.datasource.username=${REPORT_DB_METADATA_USER}
spring.datasource.password=${REPORT_DB_METADATA_PASSWORD}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

server.port=${REPORT_ENGINE_PORT}

# -----------------------------------------------------------------------------
# Report Engine
# -----------------------------------------------------------------------------
report-engine.api-key=${REPORT_AUTH_API_KEY:dev-api-key-change-me}
report-engine.templates-path=${REPORT_TEMPLATES_PATH:data/templates}
report-engine.max-rows=${REPORT_MAX_ROWS:50000}

# Datasource(s) do sistema principal (somente leitura para queries)
report-engine.datasources.principal.url=${REPORT_DATASOURCE_PRINCIPAL_URL}
report-engine.datasources.principal.username=${REPORT_DATASOURCE_PRINCIPAL_USER}
report-engine.datasources.principal.password=${REPORT_DATASOURCE_PRINCIPAL_PASSWORD}
report-engine.datasources.principal.read-only=${REPORT_DATASOURCE_PRINCIPAL_READONLY}

# Exemplo de segundo datasource (descomente se precisar)
# report-engine.datasources.legado.url=${REPORT_DATASOURCE_LEGADO_URL:jdbc:postgresql://localhost:5432/legado}
# report-engine.datasources.legado.username=${REPORT_DATASOURCE_LEGADO_USER:postgres}
# report-engine.datasources.legado.password=${REPORT_DATASOURCE_LEGADO_PASSWORD:postgres}
# report-engine.datasources.legado.read-only=true

# -----------------------------------------------------------------------------
# Actuator
# -----------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
